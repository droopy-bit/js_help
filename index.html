<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript Шпаргалка</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    header { flex-shrink: 0; }

    .nav-tabs {
      display: flex;
      background: #111;
      border-bottom: 1px solid #2a2a2a;
      padding: 0 1rem;
      flex-shrink: 0;
    }
    .nav-tab {
      padding: 10px 20px;
      font-size: 14px;
      color: #888;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      user-select: none;
    }
    .nav-tab:hover { color: #ccc; }
    .nav-tab.active { color: #fff; border-bottom-color: #22c55e; }

    /* ── Pages ── */
    .page { display: none; flex: 1; overflow-y: auto; }
    .page.active { display: block; }
    #page-playground { overflow: hidden; }
    #page-playground.active { display: flex; flex-direction: column; }

    #playground-frame { flex: 1; border: none; width: 100%; }

    /* ── Detail page ── */
    #page-detail.active { display: block; }

    .detail-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 500;
      color: #fff;
      cursor: pointer;
      margin: 1.25rem 1.5rem 0;
      padding: 10px 20px;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 10px;
      transition: all 0.15s;
      user-select: none;
    }
    .detail-back:hover { background: #333; border-color: #555; }

    .detail-container {
      max-width: 820px;
      margin: 0 auto;
      padding: 1rem 1.5rem 3rem;
    }

    .detail-title {
      font-size: 26px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 0.5rem;
    }

    .detail-card {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .detail-card-title {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    .detail-card-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.7;
      margin-bottom: 12px;
    }

    /* Код — кликабельный */
    .code-block {
      position: relative;
      cursor: pointer;
      border-radius: 8px;
      overflow: hidden;
    }

    .code-block pre {
      border-radius: 8px;
      margin: 0;
      transition: opacity 0.15s;
    }

    .code-block:hover pre { opacity: 0.85; }

    .code-hint {
      position: absolute;
      bottom: 8px;
      right: 10px;
      font-size: 11px;
      color: #22c55e;
      background: rgba(0,0,0,0.6);
      padding: 3px 8px;
      border-radius: 6px;
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
      font-family: -apple-system, sans-serif;
    }

    .code-block:hover .code-hint { opacity: 1; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #22c55e;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 20px;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      z-index: 999;
      font-family: -apple-system, sans-serif;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Grid: теми ── */
    .topics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      padding: 1.5rem;
      max-width: 960px;
      margin: 0 auto;
    }

    .topic-card {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      padding: 1.25rem;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .topic-card:hover {
      border-color: #22c55e;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.07);
    }

    .topic-icon { font-size: 28px; margin-bottom: 10px; }
    .topic-name { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
    .topic-count { font-size: 12px; color: #aaa; }

    /* Search на головній */
    .search-wrap {
      padding: 1.5rem 1.5rem 0;
      max-width: 960px;
      margin: 0 auto;
    }



    .deep-explain {
      background: #f8f8f5;
      border-left: 3px solid #22c55e;
      border-radius: 0 10px 10px 0;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      font-size: 14px;
      line-height: 1.8;
      color: #333;
    }
    .deep-explain p { margin-bottom: 0.6rem; }
    .deep-explain ul, .deep-explain ol { padding-left: 1.5rem; margin: 0.5rem 0; }
    .deep-explain li { margin-bottom: 0.3rem; }
    .deep-explain code {
      background: #e8e8e4;
      padding: 1px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 13px;
    }
    .deep-example { margin-bottom: 1.25rem; }
    .deep-example-title {
      font-size: 14px;
      font-weight: 600;
      color: #555;
      margin-bottom: 8px;
    }
    .topic-card-item:hover {
      border-color: #22c55e !important;
      transform: translateX(4px);
    }
    .topic-card-item { transition: all 0.15s; }

    @media (prefers-color-scheme: dark) {
      .deep-explain {
        background: #1a2a1a;
        color: #ccc;
      }
      .deep-explain code { background: #2a3a2a; color: #e8e8e8; }
      .deep-example-title { color: #aaa; }
    }

    .search-section-label {
      font-size: 13px; font-weight: 600; color: #888;
      text-transform: uppercase; letter-spacing: 0.6px;
      margin: 1.5rem 0 0.5rem;
    }
    .search-empty {
      color: #888; font-size: 14px; line-height: 1.8;
      padding: 2rem 0;
      font-family: -apple-system, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      .detail-title { color: #e8e8e8; }
      .detail-card { background: #1e1e1e; border-color: #2a2a2a; }
      .detail-card-title { color: #e8e8e8; }
      .detail-card-desc { color: #aaa; }
      .topic-card { background: #1e1e1e; border-color: #2a2a2a; }
      .topic-name { color: #e8e8e8; }
    }
  </style>
</head>
<body>

<header>
  <h1>⚡ JavaScript Шпаргалка</h1>
  <span id="header-sub">Обери тему для вивчення</span>
</header>

<div class="nav-tabs">
  <span class="nav-tab active" id="nav-cheatsheet" onclick="showPage('cheatsheet')">📋 Шпаргалка</span>
  <span class="nav-tab" id="nav-search" onclick="showPage('search')">🤖 Запитай</span>
  <span class="nav-tab" id="nav-playground" onclick="showPage('playground')">▶ Playground</span>
</div>

<!-- Шпаргалка (сітка тем) -->
<div class="page active" id="page-cheatsheet">
  <div class="search-wrap">
    <input class="search-bar" id="search" placeholder="🔍  Пошук по темах..." oninput="filterTopics()">
  </div>
  <div class="topics-grid" id="topics-grid"></div>
</div>

<!-- Детальна сторінка теми -->
<div class="page" id="page-detail">
  <div class="detail-back" onclick="backToCheatsheet()">← Назад</div>
  <div class="detail-container" id="detail-content"></div>
</div>


<!-- Розумний пошук -->
<div class="page" id="page-search">
  <div class="detail-container" style="max-width:820px">
    <div style="margin-bottom:1rem">
      <input
        id="smart-search"
        class="search-bar"
        placeholder="Запитай наприклад: як додати елемент в масив, що таке this, як перебрати обʼєкт..."
        oninput="doSearch()"
        onkeydown="if(event.key==='Enter') doSearch()"
        autofocus
      >
    </div>
    <div id="search-results">
      <div class="search-empty">Введи питання щоб знайти відповідь...</div>
    </div>
  </div>
</div>

<!-- Playground -->
<div class="page" id="page-playground">
  <iframe id="playground-frame" src="playground.html"></iframe>
</div>

<div class="toast" id="toast">▶ Код відкрито в Playground!</div>

<script src="data.js"></script>
<script src="editor.js"></script>

</body>
</html>
